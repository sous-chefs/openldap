---
name: ci

"on":
  pull_request:
  push:
    branches:
      - main

permissions:
  actions: write
  checks: write
  contents: read
  pull-requests: write
  statuses: write
  issues: write

jobs:
  lint-unit:
    uses: sous-chefs/.github/.github/workflows/lint-unit.yml@6.0.0
    permissions:
      actions: write
      checks: write
      contents: read
      pull-requests: write
      statuses: write
      issues: write

  integration:
    needs: lint-unit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os:
          - almalinux-8
          - almalinux-9
          - amazonlinux-2023
          - centos-stream-9
          - debian-12
          - fedora-latest
          - opensuse-leap-15
          - oraclelinux-8
          - oraclelinux-9
          - rockylinux-8
          - rockylinux-9
          - ubuntu-2004
          - ubuntu-2204
          - ubuntu-2404
        suite:
          - default
          - tls-enabled
          - type-provider
          - type-consumer

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Install Cinc Workstation
        uses: sous-chefs/.github/.github/actions/install-workstation@6.0.0

      - name: Dokken
        uses: actionshub/test-kitchen@3.0.0
        env:
          CHEF_LICENSE: accept-no-persist
          KITCHEN_LOCAL_YAML: kitchen.dokken.yml
        with:
          suite: ${{ matrix.suite }}
          os: ${{ matrix.os }}

      - name: Print debug output on failure
        if: failure()
        env:
          KITCHEN_LOCAL_YAML: kitchen.dokken.yml
        run: |
          set -x
          sudo journalctl -l --since today
          /usr/bin/kitchen exec ${{ matrix.suite }}-${{ matrix.os }} -c "journalctl -l"
